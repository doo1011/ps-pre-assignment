server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA — 새로고침 시 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 요청은 백엔드로 프록시
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
